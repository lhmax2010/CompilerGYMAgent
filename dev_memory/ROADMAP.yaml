# ============================================================
# Cross-cutting workstreams (continuous, not phases)
# ============================================================
cross_cutting:
  testing_infrastructure:
    description: "Test fixtures, harnesses, mock services"
    contributors: ["04 (workspace fixtures)", "05 (fake_gbs)", "06 (process_lab)", "07 (MockLLM)", "9.0 (fake skills)"]
    owner: "Codex (created lazily per phase need)"

  ci_cd:
    description: "GitHub Actions Linux Python 3.11 full pytest + real fcntl test"
    should_land_by: "End of Phase 04"
    requirements:
      - "All test_*.py pass on Linux"
      - "Real fcntl integration test runs"
      - "psutil-dependent tests skip on non-Linux gracefully"

  error_framework:
    description: "Unified CLI exit codes, error messages with actionable suggestions"
    should_land_by: "Phase 10"
    contributors: ["10 (cli/errors.py central)", "all phases that add CLI"]

  performance_benchmarks:
    description: "Trace scan, candidate filtering, import tar scan"
    should_land_by: "End of Phase 09"
    contributors: ["03 (trace baseline)", "07 (candidate filter)", "12 (import)"]

  security_corpus:
    description: "Path traversal, tar bomb, prompt injection, malformed YAML"
    contributors: ["02 (yaml malformed already)", "12 (tar bomb / path traversal)", "11 (prompt injection)"]
    accumulated_at: "tests/security/corpus/"

  config_versioning:
    description: "agent.config.yaml schema migrations"
    should_land_by: "Phase 04 or first user-visible config change"
    note: "Phase 01 already locked schema version; will need v2 migration path later"

  documentation:
    description: "CLI help, quickstart, resume/doctor troubleshooting guide"
    contributors: ["All phases append help text", "10 (consolidates user-facing docs)"]
    should_land_by: "Phase 10"

  unresolved_engineering_debt:
    - id: "session_id_dedup"
      status: resolved
      resolved_in: "3.7"
    - id: "dry_run_persistence"
      status: planned
      resolves_in: "15a"
    - id: "process_event_kind_whitelist"
      status: deferred
      resolves_in: "06"
    - id: "agent_cli_dispatcher_reorganization"
      status: planned
      resolves_in: "04"

# ============================================================
# Phase quality gates
# ============================================================
phase_quality_gates:
  required_for_every_phase:
    - "patch 三件套: .patch + .summary.txt + .review.md"
    - "DECISIONS.md entry with affected_requirement + decision + rationale + alternatives_considered"
    - "REVIEW_NOTES.md self-review checklist (12 items)"
    - "UT_RESULTS.md with passing test counts"
    - "PROGRESS.md update"
    - "CHECKLIST.yaml subtask completion tracking"
    - "Claude review (external_review_verdict: approve | approve_with_minor | request_changes)"
    - "Ubuntu validation (full pytest + Linux-specific fcntl)"
    - "Sync commit recording validation results"

  per_subtask_in_phase:
    - "Implementation commit"
    - "Local tests (Windows or Codex's dev env) pass"
    - "Claude review per subtask"
    - "Review-fix loop if needed (up to 3 rounds before stepping back)"
    - "Sync commit for subtask completion"

# ============================================================
# Update protocol
# ============================================================
update_protocol:
  - "When a phase starts: status: planned → in_progress + add `started_at`"
  - "When subtasks accumulate: add to `actual_subtasks_done` count"
  - "When a phase finishes: status: in_progress → done + add `closed_at` + move to completed_phases"
  - "Cadence assumption review every 3 completed phases (re-calibrate if reality differs >20%)"
  - "Roadmap revision (version bump) when major restructure needed (e.g. phase merge/split)"
