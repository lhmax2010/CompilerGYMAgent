# ============================================================
# Document system (文档体系定位 — 职责不重叠)
# 详见 doc/ARCHITECTURE_HLD.md 开头的"文档体系定位"表
# ============================================================
document_system:
  architecture_truth: "doc/ARCHITECTURE_HLD.md"   # HLD: 系统架构真相 (组件/交互/契约/不变量 I-1~I-25)。理解全局、对齐、接手时读。v1.3 治理基线 (含 7.0-contracts 冻结引用)。
  user_intent: "doc/USER_REQUIREMENTS.md"          # 用户原始意图
  detailed_spec: "doc/REQUIREMENTS.md"             # 详细需求规格 (FR-* 功能需求)
  decision_log: "dev_memory/DECISIONS.md"          # 决策日志 (每个设计决策的论证与权衡, 累积)
  progress_truth: "dev_memory/ROADMAP.yaml"        # 进度真相 (本文件: phase 顺序/状态/依赖/估算)
  note: |
    职责分工: HLD 管"架构怎么构成+不变量"(架构变化才更新);
    DECISIONS 管"某决策为什么这么定"(累积); ROADMAP 管"现在做到哪+下一步"(进度);
    REQUIREMENTS 管"需求细节"。新 phase 开工前应读 HLD 对齐架构契约 (尤其 §3.2 不变量 + §4 后续 phase 边界)。


# ============================================================
# Cadence assumption (calibrated from Phase 01-03 actual data)
# ============================================================
cadence_assumption:
  subtasks_per_workday: 1.3
  calibration_basis: "Phase 01: 9 subtasks in ~6 days; Phase 02: 11 in ~13 days; Phase 03: 15 in ~9 days; avg ~1.3"
  phase_expansion_factor: "1.5-2.0x nominal subtask count (actual Phase 03 was 15 vs nominal 10; Phase 02 was 11 vs nominal 8)"
  review_fix_rounds_per_subtask: 0-3
  ubuntu_validation_required: true
  recalibration_trigger: "If actual Phase 04-06 cadence drops below 1.0 subtask/workday, immediately revise all downstream estimates to the measured rate and push milestone dates. Do NOT wait until Phase 07."
  phase_07_note: "Phase 07 estimate (10-16 subtasks) is OPTIMISTIC; actual may need 1.5-2x due to LLM integration + constraint solving."
  notes: |
    Every "subtask" in dev_memory count includes implementation commit,
    Claude review, review-fix iterations, and Ubuntu validation sync commits.
    Use this number directly to estimate remaining time, NOT raw feature count.

