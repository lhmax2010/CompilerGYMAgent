# ============================================================
# Planned phases (Codex-recommended order)
# ============================================================
planned_phases:

  - id: "05.5"
    title: "Integration Feasibility Mock Spike"
    status: done
    started_at: "2026-05-30T09:17:16Z"
    closed_at: "2026-05-30T18:31:10+08:00"
    actual_subtasks_done: 6
    spike: true
    parallel_with: "06"
    milestone: "M1.5 (integration gate)"
    dependencies: ["04"]
    estimate_subtasks: { low: 4, high: 6 }
    risk: high
    rationale: >
      Validates that the decision core (candidate engine + constraint layer +
      experience memory + exploration schedule) integrates into a working loop
      that converges AND is demonstrably better than naive baselines. Human
      semi-auto LLM tuning is already proven effective in production; this spike
      verifies the AUTOMATED system can reproduce/exceed that with low human
      intervention. All mock — no real gbs / process mgmt / workspace protection /
      LangGraph / real LLM API.
    scope_exclusions:
      - "No real gbs (mock compile)"
      - "No process management (no subprocess)"
      - "No workspace protection (no spec/snapshot)"
      - "No LangGraph (plain Python loop)"
      - "Mock LLM is a deterministic controllable fake, not a real API call"
    goals:
      - "SyntheticObjective with known optimum requiring second-order interaction (-fA + -fB), not greedy-reachable by single-option scoring"
      - "OptionV0 minimal IR with option_id/raw/conflicts/requires"
      - "Four strategies: RandomStrategy, LLMOnlyStrategy, LocalMutationStrategy, FullAgentStrategy"
      - "Deterministic controllable MockLLM with quality=good and quality=poor"
      - "Minimal candidate engine: warmup random, LLM proposals, local mutation around best, exploration schedule switching"
      - "Minimal constraint layer: dedup, conflicts, known-failed subset filter, suspicion counter forced trial for suspected false positives"
      - "Minimal experience memory: success/failure records, trust update, Canary downgrade path"
      - "Crash/resume simulation for plain Python loop state"
    deliverables:
      - "spikes/05.5_integration_feasibility/README.md"
      - "spikes/05.5_integration_feasibility/*.py (mock-only spike code, isolated from production src/agent)"
      - "spikes/05.5_integration_feasibility/tests/ (spike tests)"
      - "dev_memory/spikes/05.5_integration_feasibility_findings.md"
    test_matrix:
      - "1 constraint blocks impossible combos: -O3 + -Os actual execution count = 0"
      - "2 experience reduces repeat attempts: failed combo is not retried"
      - "3 30-50 round convergence: full agent finds top-5% solution"
      - "4 poor LLM fallback: quality=poor still improves through random/local mutation fallback"
      - "5 false positive recovery: suspicion counter eventually forces one trial"
      - "6 against baselines: full agent beats random / LLM-only / local-mutation"
      - "7 noisy benchmark: noise + infra failures do not become hard bad experience"
      - "8 bad experience injection: bad hard rule is Canary-downgraded or does not permanently block optimum"
      - "9 duplicate pressure: repeated LLM proposals are rejected without consuming trial budget"
      - "10 second-order interaction: full agent learns -fA/-fB pair while local mutation gets stuck"
      - "11 crash-resume loop: round/history/experience state remains consistent"
    exit_criteria:
      - "Closed: constraint layer blocks conflicts/unknowns/duplicates before trial budget"
      - "Closed: suspicion counter can recover false-positive soft blocks"
      - "Closed: good LLM comparison is trial-efficiency based; full agent avoids duplicate burn"
      - "Closed: poor LLM comparison shows robustness improvement over LLM-only"
      - "Closed: crash/resume reconstruction from history is consistent"
      - "Limited: noiseless guided interaction independently finds the second-order optimum"
      - "Transferred: noisy second-order interaction discovery requires Phase 7.0 + Phase 08 statistical machinery"
    spike_findings_output: "dev_memory/spikes/05.5_integration_feasibility_findings.md"
    outcome: >
      Integration plumbing is viable, but the spike identified noise-robust
      second-order interaction discovery as the top Phase 07 risk. With no
      benchmark noise, near-miss guided interaction is the independent driver
      (guided on/random off succeeds; guided off/random on fails). With
      noise_sigma=2.0, the near-miss signal is drowned by noise and all
      ablation configurations collapse to the same 11/20 top-5% hit rate.
      Hand off this risk to Phase 7.0 search-strategy spike and Phase 08
      statistical significance work.

  - id: "08a"
    title: "Baseline + Statistical Significance - Minimal Stats Core"
    status: in_progress
    started_at: "2026-06-10T15:15:45+08:00"
    milestone: "M2 + M4 (partial)"
    requirement_sections: ["4.8", "4.9", "4.6.4 (convergence detector)"]
    dependencies: ["05"]
    can_parallel_with: []
    estimate_subtasks: { low: 6, high: 8 }
    risk: high
    goals:
      - "Pure side-effect-free statistics core required before Candidate Engine"
      - "Consume Phase 05 RunLevelRecord objects with phase=measured and valid_for_scoring=True"
      - "Compute descriptive statistics: mean, median, sample stddev (n-1), CV with mean≈0 -> None"
      - "Provide IID/right-skewed percentile bootstrap CI with seeded reproducibility"
      - "Detect autocorrelation and report conservative effective sample size (ESS)"
      - "Use moving block bootstrap for autocorrelated sequences"
      - "Compare candidate vs baseline with objective_direction-aware normalized improvement"
      - "Prefer paired design via pair_key when available; mark unpaired high-autocorrelation data inconclusive"
      - "Provide single-comparison StatisticalResult verdicts for candidate-engine convergence decisions"
      - "Provide statistical machinery needed for noise-robust near-miss / interaction discovery (05.5 handoff)"
    deliverables:
      - path: "src/agent/stats_core.py"
        description: "Minimal side-effect-free statistics core consuming Phase 05 RunLevelRecord data."
        requirements:
          - "Select only measured runs with valid_for_scoring=True for scoring statistics"
          - "Compute mean, median, sample stddev (n-1), and CV; CV is None when mean is effectively zero"
          - "Implement percentile bootstrap CI for IID/right-skewed data with configurable B (default 2000), confidence_level (default 0.95), and seeded RNG"
          - "Compute lag-1 autocorrelation rho1=corr(x_t, x_{t-1})"
          - "Compute conservative ESS: for n>=8 use min(lag-1 ESS, initial-positive-sequence multi-lag ACF ESS); for n<8 use lag-1 ESS with ess_preliminary=True"
          - "Set autocorrelation_detected when rho1 > 0.3 and iid_assumption_valid to the inverse"
          - "If ESS < ESS_MIN (default 3), return verdict=inconclusive and never significant_improvement/significant_regression"
          - "When autocorrelation is detected, use moving block bootstrap instead of IID bootstrap"
          - "Moving block bootstrap block_size = max(2, round(n ** (1/3)))"
          - "For measured_runs <= 5, mark low_power/inconclusive instead of pretending statistical significance"
          - "Compute baseline-normalized relative improvement with correct objective_direction sign"
          - "When pair_key is available for baseline/candidate records, use paired differences before bootstrap"
          - "When pair_key is absent and high autocorrelation is detected, lower confidence or return inconclusive"
      - path: "src/agent/skills/result_schema.py"
        description: "Extend RunSummaryHint and add StatisticalResult schema used by stats_core."
        requirements:
          - "RunSummaryHint adds n_measured, n_valid, n_invalid"
          - "RunSummaryHint adds effective_sample_size, lag1_autocorrelation, autocorrelation_warning"
          - "RunSummaryHint adds ess_preliminary so downstream code can tell n<8 lag-1-only ESS from conservative n>=8 ACF ESS"
          - "All new numeric fields use finite validation consistent with existing score/summary fields"
          - "StatisticalResult includes comparison, comparison_scope='single_comparison', adjusted_for_multiple_testing=False, point_estimate, ci_low, ci_high, confidence_level, verdict, method, sample counts, ESS, rho1, autocorrelation flags, low_power, and notes"
          - "StatisticalResult verdict enum: significant_improvement / significant_regression / inconclusive / no_difference"
          - "StatisticalResult method enum: iid_bootstrap / moving_block_bootstrap / paired_bootstrap"
      - path: "src/agent/skills/fake_gbs.py"
        description: "Expose fake_gbs bursty state in benchmark env snapshots during 08a.6."
        requirements:
          - "RunLevelRecord.env_snapshot records fake_gbs_state=healthy|degraded|failed when bursty profile is used"
          - "State exposure distinguishes within-trial pseudoreplicates from between-trial autocorrelation"
          - "No code for this item lands during design; implement in 08a.6"
    subtask_order:
      - "08a.1 descriptive statistics + RunSummaryHint extension: mean/median/sample stddev/CV, n_measured/n_valid/n_invalid, conservative ESS/rho1 fields, ess_preliminary"
      - "08a.2 IID/right-skewed percentile bootstrap CI with seeded reproducibility"
      - "08a.3 lag-1 autocorrelation detection + ESS correction + low-power/inconclusive rules"
      - "08a.4 moving block bootstrap for autocorrelated sequences"
      - "08a.5 baseline normalized comparison + pair_key paired design + StatisticalResult verdict schema"
      - "08a.6 fake_gbs bursty state exposure in env_snapshot + phase closeout"
    subtask_deliverable_notes:
      "08a.2":
        - "Review gate uses numerical coverage simulation: generate known-truth IID and right-skewed data, run seeded percentile bootstrap CI repeatedly, and verify nominal 95% CI coverage is approximately 95% on IID data."
        - "Implementation remains side-effect-free; no process execution is needed for bootstrap correctness review."
      "08a.4":
        - "Define moving block bootstrap correlation-length/block-size behavior; keep 08a.1 limited to ESS/rho diagnostics."
        - "Validate bursty simulations where multi-lag dependence is longer than lag-1 AR(1) predicts."
        - "Use the 08a.3 fake_gbs bursty naive IID baseline of 73.0%/74.4% coverage as the before/after comparison target."
        - "Implementation uses overlapping contiguous moving blocks, exposes block_size metadata, and keeps n<=5 on IID fallback through the autocorrelation-aware helper."
        - "Review approved with Med-1: moving block improves bursty coverage but remains below 90% at smaller n; pass low-power/inconclusive handling to 08a.5."
      "08a.3":
        - "Connect autocorrelation detection and ESS diagnostics to CI confidence metadata only; do not implement block bootstrap or verdict gates."
        - "Review gate uses known-rho sequences for rho1>0.3 detection and bursty simulations to demonstrate naive IID bootstrap undercoverage motivation for 08a.4."
        - "Implementation attaches diagnostics to IID percentile bootstrap outputs but preserves method=iid_percentile_bootstrap and does not widen CI."
      "08a.5":
        - "Full StatisticalResult schema must use single_comparison naming, including comparison_scope='single_comparison' and adjusted_for_multiple_testing=False."
        - "If exposing significance booleans, use significant_single_comparison, not bare significant."
        - "Paired comparisons must preserve pair_order and still run autocorrelation/ESS checks over the paired difference sequence."
        - "Layer verdict gates explicitly: low_power/inconclusive, no_difference, significant_improvement, significant_regression."
        - "Carry 08a.4 Med-1: small-n/severe-bursty cases where moving block coverage remains below nominal must produce low_power/inconclusive rather than significant verdicts."
        - "Defend base approximately zero in normalized improvement; do not divide by an unstable baseline mean."
        - "Multiple-comparison correction is excluded from 08a and belongs to Phase 07 policy because 08a cannot observe global comparison count M."
    exit_criteria:
      - "Descriptive statistics and bootstrap CI are checked against an independent implementation (numpy/scipy or hand calculation) and match within documented tolerance"
      - "IID/right-skewed percentile bootstrap 95% CI has coverage approximately at nominal confidence on known-truth simulations"
      - "For adequately powered bursty simulations, ESS-corrected/block-bootstrap CI reaches >=90% coverage; underpowered small-n/severe-bursty cases are marked low_power/inconclusive rather than significant"
      - "ESS too low (n_eff < ESS_MIN) returns verdict=inconclusive and never significant_improvement/significant_regression"
      - "Autocorrelation detection tests cover rho1<=0, weak positive rho1, and rho1>0.3"
      - "Moving block bootstrap preserves autocorrelation structure and is selected when autocorrelation_detected=True"
      - "Baseline-normalized improvement sign is correct for higher_is_better and lower_is_better objectives"
      - "Paired design via pair_key produces narrower/more accurate CI than unpaired comparison under bursty common-mode noise"
      - "Unpaired high-autocorrelation data is marked inconclusive or low-confidence rather than significant"
      - "fake_gbs bursty state is exposed in RunLevelRecord.env_snapshot and used to distinguish pseudoreplicates from autocorrelation"
      - "Document how repeated combo evaluation, ESS, block bootstrap, and paired design feed candidate-engine near-miss detection"
    validation_plan:
      - "Side-effect-free numerical simulations against known-truth statistical properties"
      - "IID/right-skewed bootstrap coverage simulation for 08a.2"
      - "Naive vs corrected bursty/autocorrelated coverage comparison for 08a.3/08a.4"
      - "Synthetic and fake_gbs non-Gaussian data benchmarks"
      - "Ubuntu fcntl regression"
    scope_boundaries:
      - "08a is pure statistics only; no candidate engine."
      - "08a reports single_comparison semantics only; no Bonferroni/FDR/multiple-testing correction inside 08a."
      - "fake_gbs burst state is test-only instrumentation, not a production statistical signal."
      - "No adaptive rerun policy; defer to 08b"
      - "No outlier deletion policy; defer to 08b"
      - "No sequential testing; defer to 08b"
      - "No stationary bootstrap or Bayesian model; defer to 08b"
      - "No Hall-Horowitz-Jing automatic block-size selection; 08a uses n^(1/3), adaptive block sizing deferred to 08b"

