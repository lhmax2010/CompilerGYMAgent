# ============================================================
# Cadence assumption (calibrated from Phase 01-03 actual data)
# ============================================================
cadence_assumption:
  subtasks_per_workday: 1.3
  calibration_basis: "Phase 01: 9 subtasks in ~6 days; Phase 02: 11 in ~13 days; Phase 03: 15 in ~9 days; avg ~1.3"
  phase_expansion_factor: "1.5-2.0x nominal subtask count (actual Phase 03 was 15 vs nominal 10; Phase 02 was 11 vs nominal 8)"
  review_fix_rounds_per_subtask: 0-3
  ubuntu_validation_required: true
  notes: |
    Every "subtask" in dev_memory count includes implementation commit,
    Claude review, review-fix iterations, and Ubuntu validation sync commits.
    Use this number directly to estimate remaining time, NOT raw feature count.

