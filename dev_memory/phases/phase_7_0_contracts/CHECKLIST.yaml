      - "provenance_complete requires the same plan/source/benchmark/objective across one comparison."
      - "pair_order/started_at/pair_key/pair_time_gap_sec remain on run records."
  - id: "6"
    title: "MeasurementPlan"
    status: done
    acceptance:
      - "MeasurementPlan owns candidate_id/family_id/baseline_id."
      - "plan_type distinguishes screen and confirmation."
      - "TraceSessionWriter can write measurement_plan_created events."
  - id: "7"
    title: "AcceptDecision + can_accept"
    status: done
    acceptance:
      - "can_accept returns AcceptDecision, not bool."
      - "relative_ci_low_pct drives practical threshold."
      - "incomplete provenance is rejected."
