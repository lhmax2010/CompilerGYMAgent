  - id: "4"
    title: "family_screen + is_decision_grade"
    status: done
    acceptance:
      - "BH denominator is full family size."
      - "Only verdict=significant_improvement can screen in."
      - "lower_is_better is handled by verdict rather than relative-effect sign."
      - "is_decision_grade shares the exact schema decision-grade predicate."
  - id: "5"
