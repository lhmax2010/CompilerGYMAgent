phase_exit_criteria:
  - "Trace events are append-only JSONL with strict common fields and flexible event-specific payloads."
  - "Trace append rejects unsafe targets, writes one newline-terminated JSON object, fsyncs the file, and returns a stable line reference."
  - "Trace loading validates UTF-8, JSON object shape, UTC timestamps, safe event kinds, finite numbers, and per-line size caps."
  - "Future lifecycle producers can write dry-run, rejected-candidate, process, user-action, memory, and KG events through the same primitive."
